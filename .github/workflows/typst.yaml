name: Build typst file

on:
  workflow_dispatch:
  push:
    paths:
      - "**.typ"
      - ".github/workflows/typst.yaml"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Typst
        uses: typst-community/setup-typst@v4
        with:
          typst-version: latest
      - name: Cache Typst packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/typst
          key: typst-cache-${{ runner.os }}-${{ hashFiles('rapport/**/*.typ') }}
          restore-keys: |
            typst-cache-${{ runner.os }}-
      - name: Compile report
        run: |
          mkdir -p build
          typst compile rapport/main.typ build/rapport.pdf
      - name: Upload PDF
        uses: actions/upload-artifact@v4
        with:
          name: rapport-sr05
          path: build/rapport.pdf
          retention-days: 7